<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b7bk sm baby 💗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            color: #ec91bf; 
            font-family: monospace; 
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* Start Overlay to bypass browser blocks */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
        }
        #start-btn {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            padding: 20px 40px;
            border-radius: 50px;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.9);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
            animation: breathe 2s infinite;
        }

        #terminal { 
            position: relative; 
            z-index: 10; 
            width: 95%; 
            max-width: 1000px; 
            text-align: center; 
            margin: 40px auto; 
            pointer-events: none; 
        }

        .heart-container { 
            margin: 20px 0; 
            white-space: pre; 
            line-height: 1.12; 
            font-size: 1.08rem; 
            color: #9370db; 
            display: inline-block; 
            text-align: left; 
            font-weight: 700;
            font-family: monospace;
        }

        .typing-text { margin: 10px 0; display: block; font-size: 1.6rem; }
        .final-message { font-size: 2.5rem; margin-top: 20px; color: #ec91bf; font-weight: 700; }
        .signature { font-family: 'Great Vibes', cursive; color: #ff69b4; font-size: 4.5rem; margin-top: 10px; }

        #ui { 
            font-family: 'Great Vibes', cursive; 
            position: fixed; bottom: 40px; width: 100%; text-align: center; 
            font-size: 3.5rem; z-index: 20; display: none; opacity: 0; 
            transition: opacity 1.5s; color: #b366ff; 
            animation: breathe 2.5s ease-in-out infinite; 
        }

        #music-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            background: rgba(236, 145, 191, 0.2); padding: 10px;
            border-radius: 50px; border: 1px solid #ec91bf; backdrop-filter: blur(5px);
        }

        audio { height: 30px; width: 200px; filter: sepia(100%) saturate(300%) hue-rotate(270deg); }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .name-glow { color: #ff69b4; text-shadow: 0 0 15px rgba(255, 105, 180, 0.9); font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <div id="start-btn">Press me my cutie pie</div>
    </div>

    <div id="music-container">
        <audio id="bgMusic" controls loop>
            <source src="https://files.catbox.moe/aobn7i.mp3" type="audio/mpeg">
        </audio>
    </div>

    <canvas id="mainCanvas"></canvas>
    <div id="ui">Click anywhere my love</div>
    <div id="terminal">
        <div id="intro-line" class="typing-text"></div>
        <div id="loading-line" class="typing-text"></div>
        <div id="heart-box" class="heart-container"></div>
        <div id="final-line" class="final-message"></div>
        <div id="signature-line" class="signature"></div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('bgMusic');
        let hearts = [];
        let activeFlowers = [];
        let animationStarted = false;
        let canGrowFlowers = false;
        let lastFlowerColor = "";

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class FloatingHeart {
            constructor() {
                this.reset();
                this.y = canvas.height + Math.random() * 500; 
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 6 + 4; 
                this.speed = Math.random() * 0.8 + 0.4;
                this.velX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.7 + 0.3;
                const colors = ['#ff69b4', '#9370db', '#ffb6c1', '#da70d6'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                drawHeartShape(this.x, this.y, this.size);
                ctx.restore();
            }
            update() {
                if(!animationStarted) return;
                this.y -= this.speed;
                this.x += this.velX;
                if (this.y < -20) this.reset();
            }
        }

        class Flower {
            constructor(x, y) {
                this.x = x; this.y = y; this.growth = 0;
                this.startTime = Date.now();
                const colors = ['#ff00ff', '#9d00ff', '#ff1493', '#ffd700', '#00d4ff'];
                let chosenColor;
                if (activeFlowers.length === 0) chosenColor = '#ffd700';
                else {
                    do { chosenColor = colors[Math.floor(Math.random() * colors.length)]; } 
                    while (chosenColor === lastFlowerColor);
                }
                this.color = chosenColor;
                lastFlowerColor = chosenColor;
            }
            draw() {
                const elapsed = (Date.now() - this.startTime) / 1000;
                this.growth = Math.min(1, elapsed * 1.5);
                ctx.save();
                ctx.strokeStyle = '#2d5a27'; ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, canvas.height);
                const curve = Math.sin(this.y * 0.01) * 20;
                ctx.quadraticCurveTo(this.x + curve, (canvas.height + this.y)/2, this.x, canvas.height - (canvas.height - this.y) * this.growth);
                ctx.stroke();
                if (this.growth >= 0.9) {
                    ctx.translate(this.x, this.y);
                    ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.fillStyle = this.color;
                    for (let i = 0; i < 5; i++) {
                        ctx.rotate((Math.PI * 2) / 5);
                        ctx.beginPath(); ctx.ellipse(0, -10, 8, 15, 0, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }

        function drawHeartShape(x, y, size) {
            ctx.beginPath();
            const topCurveHeight = size * 0.3;
            ctx.moveTo(x, y + topCurveHeight);
            ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + topCurveHeight);
            ctx.bezierCurveTo(x - size / 2, y + (size + topCurveHeight) / 2, x, y + (size + topCurveHeight) / 2, x, y + size);
            ctx.bezierCurveTo(x, y + (size + topCurveHeight) / 2, x + size / 2, y + (size + topCurveHeight) / 2, x + size / 2, y + topCurveHeight);
            ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + topCurveHeight);
            ctx.closePath(); ctx.fill();
        }

        for (let i = 0; i < 60; i++) hearts.push(new FloatingHeart());

        window.addEventListener('mousedown', (e) => {
            // Logic moved to startExperience to allow for the 3s delay
            if (canGrowFlowers) activeFlowers.push(new Flower(e.clientX, e.clientY));
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            activeFlowers.forEach(f => f.draw());
            requestAnimationFrame(animate);
        }
        animate();

        async function typeActionCorrected(elementId, textArray, speed) {
            animationStarted = true; 
            const el = document.getElementById(elementId);
            for (const part of textArray) {
                if (typeof part === 'string') {
                    for (let i = 0; i < part.length; i++) {
                        el.innerHTML += part[i];
                        await new Promise(r => setTimeout(r, speed));
                    }
                } else if (typeof part === 'object' && part.html) {
                    el.innerHTML += part.html;
                    await new Promise(r => setTimeout(r, speed * 1.5)); 
                }
            }
        }

        async function startExperience() {
            // Hide overlay
            document.getElementById('overlay').style.display = 'none';
            
            // Start Music with a 3-second delay
            setTimeout(() => {
                music.play();
            }, 3000);

            const name = prompt("Enter your name:", "Bahaa") || "Bahaa";
            
            const heartTemplate = [
                "      @@@@@@@@@@@@@@@           @@@@@@@@@@@@@@@      ",
                "    @@@@@@@@@@@@@@@@@@@       @@@@@@@@@@@@@@@@@@@    ",
                "  @@@@@@@@@@@@@@@@@@@@@@@   @@@@@@@@@@@@@@@@@@@@@@@  ",
                " @@@@@@@@@@@@@@@@@@@@@@@@@ @@@@@@@@@@@@@@@@@@@@@@@@@ ",
                "@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@",
                "@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@",
                "@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@",
                " @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@ ",
                "  @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@  ",
                "    @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@    ",
                "      @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@      ",
                "        @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@        ",
                "          @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@          ",
                "            @@@@@@@@@@@@@@@@@@@@@@@@@@@@@            ",
                "              @@@@@@@@@@@@@@@@@@@@@@@@@              ",
                "                @@@@@@@@@@@@@@@@@@@@@                ",
                "                  @@@@@@@@@@@@@@@@@                  ",
                "                    @@@@@@@@@@@@@                    ",
                "                      @@@@@@@@@                      ",
                "                        @@@@@                        ",
                "                          @                          "
            ];

            const heartFiller = `I love u ${name} `; 
            const totalCharsNeeded = heartTemplate.join("").split("@").length - 1;
            const longFiller = heartFiller.repeat(Math.ceil(totalCharsNeeded / heartFiller.length));
            let fp = 0;
            const finalHeartRows = heartTemplate.map(row => {
                let newRow = "";
                for (let char of row) {
                    if (char === "@") newRow += longFiller[fp++];
                    else newRow += " ";
                }
                return newRow;
            });

            const SPEEDS = { typing: 60, heartRow: 130, signature: 110, pause: 600 };

            await typeActionCorrected("intro-line", ["Jannah's favourite person's name: ", { html: `<span class="name-glow">${name}</span>` }], SPEEDS.typing);
            await new Promise(r => setTimeout(r, SPEEDS.pause));
            await typeActionCorrected("loading-line", ["♥️ Generating joony's little heart... ♥️"], SPEEDS.typing);
            await new Promise(r => setTimeout(r, SPEEDS.pause));
            
            const hb = document.getElementById("heart-box");
            for (let row of finalHeartRows) {
                hb.textContent += row + "\n";
                await new Promise(r => setTimeout(r, SPEEDS.heartRow)); 
            }
            
            await new Promise(r => setTimeout(r, SPEEDS.pause));
            await typeActionCorrected("final-line", ["I love you so much, ", { html: `<span class="name-glow">${name}</span>` }, "! ♥️"], SPEEDS.typing);
            await new Promise(r => setTimeout(r, SPEEDS.pause));
            
            const sigEl = document.getElementById("signature-line");
            for(let char of "Your Cute Princess.") {
                sigEl.innerHTML += char;
                await new Promise(r => setTimeout(r, SPEEDS.signature));
            }
            
            canGrowFlowers = true; 
            const ui = document.getElementById('ui');
            ui.style.display = "block";
            setTimeout(() => { ui.style.opacity = "1"; }, 50);
        }
    </script>
</body>
</html>
